<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ads Reload</title>

  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 40px;
    }

    #ad-container {
      width: 100%;
      margin: auto;
      position: relative;
      z-index: 99998;
    }

    .info {
      margin-top: 20px;
      opacity: 0.6;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>Publicité A‑Ads (Reload Auto)</h2>

  <div id="ad-container"></div>

  <div class="info">
    Reload automatique toutes les 30 secondes
  </div>

  <script>
    function reloadAAds() {
      const container = document.getElementById("ad-container");

      // On supprime l'ancien iframe
      container.innerHTML = "";

      // On recrée l'iframe A-Ads
      const iframe = document.createElement("iframe");
      iframe.setAttribute("data-aa", "2444134");
      iframe.src = "//acceptable.a-ads.com/2444134/?size=Adaptive";
      iframe.style.border = "0";
      iframe.style.padding = "0";
      iframe.style.width = "70%";
      iframe.style.height = "auto";
      iframe.style.overflow = "hidden";
      iframe.style.display = "block";
      iframe.style.margin = "auto";

      container.appendChild(iframe);
    }

    // Premier affichage
    reloadAAds();

    // Reload toutes les 30 secondes
    setInterval(reloadAAds, 600);
  </script>

</body>
</html>
