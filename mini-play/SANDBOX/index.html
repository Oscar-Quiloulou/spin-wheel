<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sandbox avancé</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #toolbar {
      margin: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      padding: 4px 8px;
      cursor: pointer;
      background: #222;
      color: #eee;
      border: 1px solid #555;
    }
    button.active {
      border-color: #0f0;
    }
    canvas {
      image-rendering: pixelated;
      border: 1px solid #444;
      background: black;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button data-mat="SAND">Sable</button>
    <button data-mat="WATER">Eau</button>
    <button data-mat="LAVA">Lave</button>
    <button data-mat="STONE">Pierre</button>
    <button data-mat="FIRE">Feu</button>
    <button data-mat="SMOKE">Fumée</button>
    <button data-mat="ERASE">Gomme</button>
    <button id="clear">Clear</button>
  </div>
  <canvas id="canvas" width="300" height="200"></canvas>

  <script src="main.js"></script>
</body>
</html>
