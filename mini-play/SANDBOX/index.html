<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sandbox 2D</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: sans-serif;
    }

    #toolbar {
      display: flex;
      gap: 8px;
      padding: 8px;
      background: #222;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }

    #toolbar button {
      padding: 6px 10px;
      background: #333;
      border: 1px solid #555;
      color: #eee;
      cursor: pointer;
      font-size: 13px;
    }

    #toolbar button.active {
      background: #666;
      border-color: #fff;
    }

    canvas {
      display: block;
      margin: auto;
      image-rendering: pixelated;
      border: 1px solid #444;
      background: #000;

      /* IMPORTANT : taille réelle */
      width: 200px;
      height: 150px;
    }
  </style>
</head>

<body>

  <div id="toolbar">
    <button data-tool="EMPTY">Vide</button>
    <button data-tool="WALL">Mur</button>
    <button data-tool="WATER">Eau</button>
    <button data-tool="OIL">Huile</button>
    <button data-tool="FIRE">Feu</button>
    <button data-tool="LAVA">Lave</button>
    <button data-tool="BOMB">Bombe</button>
    <button data-tool="GRENADE">Grenade</button>

    <span style="margin-left:20px;">Taille :</span>
    <input type="range" id="brush" min="1" max="8" value="3">
  </div>

  <canvas id="game" width="200" height="150"></canvas>

  <script type="module" src="js/main.js"></script>
</body>
</html>
