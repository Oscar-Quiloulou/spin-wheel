<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NEON CORE OS</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02030a;
      font-family: "Consolas", monospace;
      color: #00f6ff;
    }

    /* Fond néon animé */
    #neon-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 10% 10%, #00f6ff33, transparent),
        radial-gradient(circle at 90% 90%, #ff00ff33, transparent),
        radial-gradient(circle at 50% 50%, #00ffaa22, transparent);
      filter: blur(40px);
      animation: neonMove 14s infinite alternate ease-in-out;
      z-index: -2;
    }
    @keyframes neonMove {
      0% { background-position: 10% 10%, 90% 90%, 50% 50%; }
      100% { background-position: 80% 20%, 20% 80%, 50% 50%; }
    }

    /* Scanlines HUD */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 255, 255, 0.05) 0px,
        rgba(0, 255, 255, 0.05) 2px,
        transparent 3px,
        transparent 6px
      );
      pointer-events: none;
      z-index: 9999;
      opacity: 0.18;
    }

    /* Workspace infini */
    #workspace {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      cursor: grab;
    }

    /* Modules (fenêtres) */
    .module {
      position: absolute;
      min-width: 240px;
      min-height: 150px;
      background: rgba(0,0,0,0.75);
      border: 1px solid #00f6ff55;
      border-radius: 12px;
      box-shadow: 0 0 20px #00f6ff55;
      backdrop-filter: blur(8px);
      overflow: hidden;
      animation: pulse 4s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 12px #00f6ff55; }
      50% { box-shadow: 0 0 26px #00f6ffaa; }
      100% { box-shadow: 0 0 12px #00f6ff55; }
    }

    .module-header {
      height: 26px;
      padding: 4px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(90deg, #001018, #001a22);
      cursor: move;
      font-size: 12px;
    }

    .module-header .title {
      text-shadow: 0 0 6px #00f6ff;
    }

    .module-header .controls span {
      margin-left: 8px;
      cursor: pointer;
    }

    .module-body {
      padding: 10px;
      font-size: 13px;
      height: calc(100% - 26px);
      box-sizing: border-box;
      overflow: auto;
    }

    .resize-handle {
      position: absolute;
      width: 14px;
      height: 14px;
      right: 4px;
      bottom: 4px;
      border-radius: 4px;
      border: 1px solid #00f6ffaa;
      cursor: nwse-resize;
      background: rgba(0,246,255,0.2);
    }

    /* Halo HUD autour des modules */
    .module::before {
      content: "";
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        #00f6ff22 90deg,
        transparent 180deg
      );
      animation: hudRotate 7s linear infinite;
      pointer-events: none;
    }
    @keyframes hudRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Menu radial */
    #radial-menu {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 1px solid #00f6ff55;
      box-shadow: 0 0 25px #00f6ff55;
      display: none;
      pointer-events: none;
      background: radial-gradient(circle, rgba(0,0,0,0.9), transparent);
      z-index: 5000;
    }

    .radial-item {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(0,0,0,0.85);
      border: 1px solid #00f6ff55;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      text-align: center;
      pointer-events: auto;
      cursor: pointer;
      box-shadow: 0 0 12px #00f6ff55;
    }
    .radial-item:hover {
      background: rgba(0,246,255,0.15);
    }

    /* Timeline d’événements */
    #timeline {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: 70%;
      height: 60px;
      background: rgba(0,0,0,0.8);
      border-radius: 12px;
      border: 1px solid #00f6ff55;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 6px;
      font-size: 11px;
      z-index: 4000;
      overflow: hidden;
    }

    .event {
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(0,246,255,0.1);
      border: 1px solid #00f6ff55;
      white-space: nowrap;
    }

    /* Notifications */
    #notifications {
      position: fixed;
      top: 60px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 4500;
    }
    .toast {
      background: rgba(0,0,0,0.85);
      border: 1px solid #00f6ffaa;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      box-shadow: 0 0 12px #00f6ff55;
    }

    /* Dock / icônes */
    #dock {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 3000;
    }
    .dock-icon {
      padding: 6px 10px;
      background: rgba(0,0,0,0.8);
      border-radius: 10px;
      border: 1px solid #00f6ff55;
      cursor: pointer;
      font-size: 12px;
      box-shadow: 0 0 10px #00f6ff55;
    }
    .dock-icon:hover {
      background: rgba(0,246,255,0.15);
    }

    /* Mode clair optionnel */
    .light {
      background: #f5f5f5;
      color: #000;
    }
    .light .module {
      background: rgba(255,255,255,0.9);
      border-color: #00a0b3;
      box-shadow: 0 0 16px #00a0b3;
    }
    .light #timeline,
    .light #dock,
    .light #notifications {
      background: rgba(255,255,255,0.9);
      color: #000;
    }

    #themeToggle {
      position: fixed;
      top: 15px;
      right: 20px;
      z-index: 5001;
      background: #00f6ff;
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 12px #00f6ff;
    }
  </style>
</head>
<body>

<div id="neon-bg"></div>
<div id="workspace"></div>

<button id="themeToggle">Mode Clair</button>

<div id="dock">
  <div class="dock-icon" data-app="word">Word</div>
  <div class="dock-icon" data-app="sheets">Sheets</div>
  <div class="dock-icon" data-app="paint">Paint</div>
  <div class="dock-icon" data-app="explorer">Explorer</div>
  <div class="dock-icon" data-app="terminal">Terminal</div>
  <div class="dock-icon" data-app="browser">Browser</div>
  <div class="dock-icon" data-app="tasks">Tasks</div>
</div>

<div id="radial-menu">
  <div class="radial-item" data-app="sys" style="top:10px; left:70px;">Système</div>
  <div class="radial-item" data-app="net" style="top:70px; left:140px;">Réseau</div>
  <div class="radial-item" data-app="geo" style="top:130px; left:70px;">Localisation</div>
  <div class="radial-item" data-app="dash" style="top:70px; left:0px;">Dashboard</div>
</div>

<div id="timeline"></div>
<div id="notifications"></div>

<script>
  const workspace = document.getElementById("workspace");
  const radial = document.getElementById("radial-menu");
  const timeline = document.getElementById("timeline");
  const notifications = document.getElementById("notifications");
  const themeToggle = document.getElementById("themeToggle");

  let scale = 1;
  let offsetX = 0, offsetY = 0;
  let draggingWorkspace = false;
  let lastX, lastY;
  let zTop = 1000;

  // Pan workspace
  workspace.addEventListener("mousedown", e => {
    if (e.target !== workspace) return;
    draggingWorkspace = true;
    lastX = e.clientX;
    lastY = e.clientY;
    workspace.style.cursor = "grabbing";
  });

  document.addEventListener("mousemove", e => {
    if (!draggingWorkspace) return;
    offsetX += (e.clientX - lastX);
    offsetY += (e.clientY - lastY);
    lastX = e.clientX;
    lastY = e.clientY;
    workspace.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  });

  document.addEventListener("mouseup", () => {
    draggingWorkspace = false;
    workspace.style.cursor = "grab";
  });

  // Zoom
  document.addEventListener("wheel", e => {
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    scale *= delta;
    scale = Math.max(0.4, Math.min(2.5, scale));
    workspace.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  });

  // Radial menu (clic droit)
  document.addEventListener("contextmenu", e => {
    e.preventDefault();
    radial.style.display = "block";
    radial.style.left = (e.clientX - 110) + "px";
    radial.style.top = (e.clientY - 110) + "px";
  });

  document.addEventListener("click", e => {
    if (!radial.contains(e.target)) {
      radial.style.display = "none";
    }
  });

  // Timeline
  function logEvent(msg) {
    const el = document.createElement("div");
    el.className = "event";
    el.textContent = msg;
    timeline.appendChild(el);
    if (timeline.children.length > 14) {
      timeline.removeChild(timeline.firstChild);
    }
  }

  // Notifications
  function notify(msg) {
    const t = document.createElement("div");
    t.className = "toast";
    t.textContent = msg;
    notifications.appendChild(t);
    setTimeout(() => t.remove(), 4000);
  }

  // Création de module
  function createModule(title, x, y, content, opts = {}) {
    const mod = document.createElement("div");
    mod.className = "module";
    mod.style.left = x + "px";
    mod.style.top = y + "px";
    mod.style.width = (opts.width || 320) + "px";
    mod.style.height = (opts.height || 220) + "px";

    const header = document.createElement("div");
    header.className = "module-header";
    header.innerHTML = `
      <span class="title">${title}</span>
      <span class="controls">
        <span data-action="min">–</span>
        <span data-action="close">✖</span>
      </span>
    `;

    const body = document.createElement("div");
    body.className = "module-body";
    body.innerHTML = content;

    const resize = document.createElement("div");
    resize.className = "resize-handle";

    mod.appendChild(header);
    mod.appendChild(body);
    mod.appendChild(resize);
    workspace.appendChild(mod);

    // Focus
    mod.addEventListener("mousedown", () => {
      zTop++;
      mod.style.zIndex = zTop;
    });
    zTop++;
    mod.style.zIndex = zTop;

    // Drag module
    let drag = false, ox, oy;
    header.addEventListener("mousedown", e => {
      if (e.target.dataset.action) return;
      drag = true;
      ox = e.clientX - mod.offsetLeft;
      oy = e.clientY - mod.offsetTop;
    });
    document.addEventListener("mousemove", e => {
      if (!drag) return;
      mod.style.left = (e.clientX - ox) + "px";
      mod.style.top = (e.clientY - oy) + "px";
    });
    document.addEventListener("mouseup", () => drag = false);

    // Close / Minimize
    header.querySelectorAll(".controls span").forEach(btn => {
      btn.onclick = () => {
        const action = btn.dataset.action;
        if (action === "close") {
          mod.remove();
          logEvent(`Fermé : ${title}`);
        }
        if (action === "min") {
          if (mod.style.display !== "none") {
            mod.dataset.prevDisplay = "block";
            mod.style.display = "none";
            logEvent(`Minimisé : ${title}`);
          }
        }
      };
    });

    // Resize
    let resizing = false, rw, rh, sx, sy;
    resize.addEventListener("mousedown", e => {
      resizing = true;
      rw = mod.offsetWidth;
      rh = mod.offsetHeight;
      sx = e.clientX;
      sy = e.clientY;
      e.stopPropagation();
    });
    document.addEventListener("mousemove", e => {
      if (!resizing) return;
      mod.style.width = (rw + (e.clientX - sx)) + "px";
      mod.style.height = (rh + (e.clientY - sy)) + "px";
    });
    document.addEventListener("mouseup", () => resizing = false);

    logEvent(`Ouvert : ${title}`);
    return mod;
  }

  // Apps

  function appWord() {
    createModule("NEON Word", 260, 160, `
      <div contenteditable="true"
           style="width:100%;height:100%;outline:none;font-size:15px;">
        Commence à écrire…
      </div>
    `, { width: 420, height: 260 });
  }

  function appSheets() {
    const rows = 12, cols = 6;
    let html = "<table id='sheet' style='border-collapse:collapse;width:100%;'>";
    for (let r = 0; r < rows; r++) {
      html += "<tr>";
      for (let c = 0; c < cols; c++) {
        html += "<td contenteditable='true' style='border:1px solid #00f6ff55;padding:4px;'></td>";
      }
      html += "</tr>";
    }
    html += "</table>";
    createModule("NEON Sheets", 320, 200, html, { width: 420, height: 260 });
  }

  function appPaint() {
    const mod = createModule("NEON Paint", 380, 220, `
      <canvas id="paint" width="500" height="300"
              style="background:#000;border:1px solid #00f6ff55;"></canvas>
    `, { width: 540, height: 360 });

    const c = mod.querySelector("#paint");
    const ctx = c.getContext("2d");
    let draw = false;

    c.onmousedown = () => draw = true;
    c.onmouseup = () => draw = false;
    c.onmouseleave = () => draw = false;
    c.onmousemove = e => {
      if (!draw) return;
      ctx.fillStyle = "#00f6ff";
      ctx.fillRect(e.offsetX, e.offsetY, 4, 4);
    };
  }

  function appExplorer() {
    const mod = createModule("Explorateur", 220, 140, `
      <div id="explorer-list"></div>
      <button id="new-file" style="margin-top:8px;">Nouveau fichier</button>
    `, { width: 320, height: 240 });

    const fsKey = "neon_fs";
    const list = mod.querySelector("#explorer-list");
    const btn = mod.querySelector("#new-file");

    function loadFS() {
      return JSON.parse(localStorage.getItem(fsKey) || "{}");
    }
    function saveFS(fs) {
      localStorage.setItem(fsKey, JSON.stringify(fs));
    }
    function render() {
      const fs = loadFS();
      list.innerHTML = Object.keys(fs).map(name =>
        `<div style="padding:4px;cursor:pointer;">📄 ${name}</div>`
      ).join("") || "<i>Aucun fichier</i>";
    }

    btn.onclick = () => {
      const name = prompt("Nom du fichier ?");
      if (!name) return;
      const fs = loadFS();
      fs[name] = "Fichier vide";
      saveFS(fs);
      render();
      notify("Fichier créé : " + name);
    };

    render();
  }

  function appTerminal() {
    const mod = createModule("Terminal", 420, 160, `
      <div id="term-output" style="height:200px;overflow:auto;"></div>
      <input id="term-input"
             style="width:100%;background:#001018;color:#00f6ff;border:none;padding:6px;"
             placeholder="Commande (apps, word, sheets, paint, explorer, browser, tasks)">
    `, { width: 420, height: 260 });

    const out = mod.querySelector("#term-output");
    const input = mod.querySelector("#term-input");

    function print(msg) {
      out.innerHTML += msg + "<br>";
      out.scrollTop = out.scrollHeight;
    }

    print("NEON CORE Terminal");
    print("Tape 'apps' pour la liste des apps.");

    input.onkeydown = e => {
      if (e.key !== "Enter") return;
      const cmd = input.value.trim();
      input.value = "";
      print("> " + cmd);

      if (cmd === "apps") {
        print("Apps: word, sheets, paint, explorer, browser, tasks, sys, net, geo, dash");
      } else if (cmd === "word") appWord();
      else if (cmd === "sheets") appSheets();
      else if (cmd === "paint") appPaint();
      else if (cmd === "explorer") appExplorer();
      else if (cmd === "browser") appBrowser();
      else if (cmd === "tasks") appTaskManager();
      else if (cmd === "sys") appSys();
      else if (cmd === "net") appNet();
      else if (cmd === "geo") appGeo();
      else if (cmd === "dash") appDash();
      else print("Commande inconnue.");
    };
  }

  function appBrowser() {
    const mod = createModule("Navigateur", 480, 200, `
      <input id="url" placeholder="https://..." 
             style="width:100%;padding:6px;background:#001018;color:#00f6ff;border:none;">
      <iframe id="webview" style="width:100%;height:260px;border:none;background:#000;margin-top:6px;"></iframe>
    `, { width: 480, height: 340 });

    const url = mod.querySelector("#url");
    const web = mod.querySelector("#webview");

    url.onkeydown = e => {
      if (e.key === "Enter") {
        web.src = url.value;
        logEvent("Navigateur → " + url.value);
      }
    };
  }

  function appTaskManager() {
    const mod = createModule("Gestionnaire de tâches", 540, 220, `
      <div id="tasks"></div>
    `, { width: 320, height: 240 });

    const el = mod.querySelector("#tasks");
    setInterval(() => {
      const mods = [...document.querySelectorAll(".module")];
      el.innerHTML = mods.map(m => {
        const title = m.querySelector(".title")?.textContent || "Module";
        return `<div>🟦 ${title}</div>`;
      }).join("") || "<i>Aucun module</i>";
    }, 700);
  }

  function appSys() {
    createModule("Système", 200, 120, `
      <div>Threads CPU: ${navigator.hardwareConcurrency || "?"}</div>
      <div>RAM approx: ${navigator.deviceMemory || "?"} Go</div>
      <div>User Agent: ${navigator.userAgent}</div>
    `, { width: 360, height: 200 });
  }

  function appNet() {
    const mod = createModule("Réseau", 260, 180, `
      <div id="net-info">Test en cours...</div>
    `, { width: 320, height: 180 });

    const el = mod.querySelector("#net-info");
    const t0 = performance.now();
    fetch("https://cloudflare.com").then(() => {
      const ping = Math.round(performance.now() - t0);
      el.innerHTML = `Ping approx: ${ping} ms`;
    });
  }

  function appGeo() {
    const mod = createModule("Localisation", 320, 220, `
      <div id="geo-info">Chargement...</div>
    `, { width: 360, height: 200 });

    const el = mod.querySelector("#geo-info");
    fetch("https://ipapi.co/json/").then(r => r.json()).then(d => {
      el.innerHTML = `
        IP: ${d.ip}<br>
        Ville: ${d.city}<br>
        Pays: ${d.country_name}<br>
        Lat: ${d.latitude} / Lon: ${d.longitude}
      `;
    });
  }

  function appDash() {
    createModule("Dashboard", 380, 260, `
      <div>OS: NEON CORE</div>
      <div>Heure: ${new Date().toLocaleTimeString()}</div>
      <div>Session ID: ${Math.random().toString(16).slice(2)}</div>
    `, { width: 320, height: 180 });
  }

  // Radial apps
  document.querySelectorAll(".radial-item").forEach(item => {
    item.onclick = () => {
      const app = item.dataset.app;
      radial.style.display = "none";
      if (app === "sys") appSys();
      if (app === "net") appNet();
      if (app === "geo") appGeo();
      if (app === "dash") appDash();
    };
  });

  // Dock apps
  document.querySelectorAll(".dock-icon").forEach(icon => {
    icon.onclick = () => {
      const app = icon.dataset.app;
      if (app === "word") appWord();
      if (app === "sheets") appSheets();
      if (app === "paint") appPaint();
      if (app === "explorer") appExplorer();
      if (app === "terminal") appTerminal();
      if (app === "browser") appBrowser();
      if (app === "tasks") appTaskManager();
    };
  });

  // Mode sombre / clair
  themeToggle.onclick = () => {
    document.body.classList.toggle("light");
    themeToggle.textContent = document.body.classList.contains("light")
      ? "Mode Sombre"
      : "Mode Clair";
  };

  // Boot
  logEvent("NEON CORE OS démarré.");
  notify("Bienvenue dans NEON CORE OS.");
</script>

</body>
</html>
